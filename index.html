<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turing — NSW Advanced & Extension Mathematics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
              mono: ['JetBrains Mono', 'Courier New', 'monospace'],
            },
          },
        },
      }
    </script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css">

    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        :root {
            --bg: #07080a;
            --card: #0b0c10;
            --accent: #10b981;
            --accent-dim: #059669;
            --accent-glow: rgba(16, 185, 129, 0.15);
            --border: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.12);
            --text: #e4e4e7;
            --text-dim: #71717a;
        }

        * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            letter-spacing: -0.01em;
        }

        .mono-font { font-family: 'JetBrains Mono', 'Courier New', monospace !important; }

        button {
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: none;
            transition: all 0.15s ease;
        }
        button:hover:not(:disabled) {
            border-color: var(--border-hover);
            background-color: rgba(255, 255, 255, 0.03);
        }
        button:disabled { opacity: 0.35; cursor: not-allowed; }

        button.border-0, button.border-transparent, button.no-round {
            border: 0 none !important;
            border-radius: 0;
        }
        button.border-transparent:hover:not(:disabled) {
            border-color: transparent !important;
        }

        .card {
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--card);
        }

        input, textarea, select {
            border: 1px solid var(--border) !important;
            border-radius: 6px !important;
            background-color: rgba(255,255,255,0.02);
            color: var(--text);
            outline: none;
            transition: border-color 0.15s ease;
        }
        input:focus, textarea:focus, select:focus {
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }

        .katex { font-size: 1.05em !important; }
        .katex-display { margin: 0.6em 0 !important; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
